<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tidapp - Aktiviteter</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="desktop-wrapper">
    <header class="header">Tidapp - Mina Aktiviteter</header>
    <div class="main-layout">
        <aside class="sidebar">
            <a href="index.html" class="nav-item">HEM</a>
            <a href="aktiviteter.html" class="nav-item active">AKTIVITETER</a>
            <a href="uppgifter.html" class="nav-item">UPPGIFTER</a>
            <a href="sammanstallning.html" class="nav-item">TOTALT</a>
        </aside>
        <main class="content">
            <h2>Hantera Aktiviteter</h2>

            <button class="add-btn">+ Skapa ny aktivitet</button>

            <div class="item-list">
                <div class="item">
                    <span>Cykla</span>
                    <div class="action-buttons">
                        <a href="#redigera-aktivitet-1" class="action-btn edit-btn" style="text-decoration:none;">Ändra</a>
                        <button class="action-btn delete-btn">Ta bort</button>
                    </div>
                </div>
                <div class="item">
                    <span>Läxor</span>
                    <div class="action-buttons">
                        <a href="#redigera-aktivitet-2" class="action-btn edit-btn" style="text-decoration:none;">Ändra</a>
                        <button class="action-btn delete-btn">Ta bort</button>
                    </div>
                </div>
            </div>

            <div id="redigera-aktivitet-1" class="hidden-section">
                <h3>Redigera Aktivitet (Cykla)</h3>
                <div class="edit-box-content">
                    <div class="input-field">
                        <label>Namn på aktivitet</label>
                        <input type="text" value="Cykla">
                    </div>

                    <div class="edit-buttons">
                        <a href="#" class="save-btn" style="text-decoration:none;">Spara</a>
                        <a href="#" class="action-btn cancel-btn" style="text-decoration:none;">Avbryt</a>
                    </div>
                </div>
            </div>

            <div id="redigera-aktivitet-2" class="hidden-section">
                <h3>Redigera Aktivitet (Läxor)</h3>
                <div class="edit-box-content">
                    <div class="input-field">
                        <label>Namn på aktivitet</label>
                        <input type="text" value="Läxor">
                    </div>

                    <div class="edit-buttons">
                        <a href="#" class="save-btn" style="text-decoration:none;">Spara</a>
                        <a href="#" class="action-btn cancel-btn" style="text-decoration:none;">Avbryt</a>
                    </div>
                </div>
            </div>

        </main>
    </div>
</div>

<div class="mobile-wrapper">
</div>

</body>
</html>
