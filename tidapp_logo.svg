  <line x1="255" y1="145" x2="268" y2="145" stroke="#2196F3" stroke-width="4" stroke-linecap="round" style="fill:rgb(0, 0, 0);stroke:rgb(33, 150, 243);color:rgb(255, 255, 255);stroke-width:4px;stroke-linecap:round;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
