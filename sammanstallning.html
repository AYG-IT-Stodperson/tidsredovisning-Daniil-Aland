<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tidapp - Sammanställning</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>


<!-- DESKTOP VY -->
<div class="desktop-wrapper">
    <header class="header">Tidapp - Sammanställning</header>




    <div class="main-layout">
        <!-- sidomeny för navigering mellan sidor -->
        <aside class="sidebar">
            <a href="index.html" class="nav-item">HEM</a>
            <a href="aktiviteter.html" class="nav-item">AKTIVITETER</a>
            <a href="uppgifter.html" class="nav-item">UPPGIFTER</a>
            <a href="sammanstallning.html" class="nav-item active">TOTALT</a>
        </aside>



        <main class="content">
            <h2>Total Tidrapport</h2>

            <!-- filtrering, välj tidsperiod för rapporten -->

            <p>
                Period:
                <input type="date" id="franDatum" value="2026-05-01">
                <input type="date" id="tillDatum" value="2026-06-01">
                <button id="hamta">Hämta data</button>
            </p>

            <!-- rapportbehållare för Desktop -->
            <div id="report-box-desktop" class="report-box">
                <ul class="lista heading">
                    <li>Aktivitet</li>
                    <li class="right">Total tid</li>
                </ul>


                <div class="lista-container"></div>

                <hr>
                <!-- summering av all tid för vald period -->
                <b class="total-tid-label" id="total-desktop">TOTAL TID: 0 timmar</b>
            </div>
        </main>
    </div>
</div>





<!-- MOBIL VY -->
<div class="mobile-wrapper">
    <header class="header">Tidapp - Sammanställning</header>


    <div class="mobile-content">
        <!-- samma datumväljare som på desktop fast optimerad för mobil -->
        <p>
            Period:
            <input type="date" id="franDatum-mobil" value="2026-05-01">
            <input type="date" id="tillDatum-mobil" value="2026-06-01">
            <button id="hamta-mobil">Hämta data</button>
        </p>



        <!-- rapportbehållare för mobil -->
        <div id="report-box-mobile" class="report-box" style="margin-top:10px;">
            <ul class="lista heading">
                <li>Aktivitet</li>
                <li class="right">Total tid</li>
            </ul>




            <!-- javaScript fyller på listan här -->
            <div class="lista-container"></div>

            <hr>
            <b class="total-tid-label" id="total-mobile">TOTAL TID: 0 timmar</b>
        </div>
    </div>



    <!-- fast bottenmeny för mobilanvändare -->
    <footer class="mobile-footer">
        <a href="index.html" class="nav-item">Hem</a>
        <a href="aktiviteter.html" class="nav-item">Aktiviteter</a>
        <a href="uppgifter.html" class="nav-item">Uppgifter</a>
        <a href="sammanstallning.html" class="nav-item active">Totalt</a>
    </footer>
</div>


<!-- laddar in nödvändiga skriptfiler -->
<script src="./js/main.js"></script>
<script src="./js/index.js"></script>

</body>
</html>
