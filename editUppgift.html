<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tidapp - Redigera Uppgift</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/editUppgift.css">
</head>
<body>



<!-- DESKTOP VY -->
<div class="desktop-wrapper">
    <header class="header">Tidapp - Uppgifter</header>
    <div class="main-layout">
        <aside class="sidebar">
            <a href="index.html" class="nav-item">HEM</a>
            <a href="aktiviteter.html" class="nav-item">AKTIVITETER</a>
            <a href="uppgifter.html" class="nav-item active">UPPGIFTER</a>
            <a href="sammanstallning.html" class="nav-item">TOTALT</a>
        </aside>
        <main class="content">

            <h2 id="form-titel">Ny uppgift</h2>

            <div class="log-form">
                <div class="input-field edit-id-field">
                    <span id="visa-id" class="id-text"></span>
                    <label>Aktivitet</label>
                    <select id="uppgift-aktivitet" required></select>
                </div>

                <div class="input-field">
                    <label>Datum</label>
                    <input type="date" id="uppgift-datum" required>
                </div>

                <div class="input-field">
                    <label>Varaktighet</label>
                    <input type="time" id="uppgift-tid" required min="00:15" max="08:00" step="900">
                </div>

                <div class="input-field">
                    <label>Beskrivning</label>
                    <input type="text" id="uppgift-beskrivning" placeholder="Vad gjorde du?">
                </div>

                <div class="edit-buttons">
                    <button class="save-btn" id="spara-btn">Spara</button>
                    <a href="uppgifter.html" class="cancel-btn">Avbryt</a>
                </div>
            </div>
        </main>
    </div>
</div>



<!-- MOBIL VY -->
<div class="mobile-wrapper">
    <header class="mobile-header">
        Tidapp - Uppgifter
        <a href="uppgifter.html" class="cancel-btn" style="font-size:13px;">✕</a>
    </header>
    <div class="mobile-content">
        <h2 id="form-titel-mobil" style="padding: 16px 16px 0;">Ny uppgift</h2>
        <div class="log-form" style="padding: 16px;">
            <div class="input-field edit-id-field">
                <span id="visa-id-mobil" class="id-text"></span>
                <label>Aktivitet</label>
                <select id="uppgift-aktivitet-mobil" required></select>
            </div>


            <div class="input-field">
                <label>Datum</label>
                <input type="date" id="uppgift-datum-mobil" required>
            </div>

            <div class="input-field">
                <label>Varaktighet</label>
                <input type="time" id="uppgift-tid-mobil" required min="00:15" max="08:00" step="900">
            </div>

            <div class="input-field">
                <label>Beskrivning</label>
                <input type="text" id="uppgift-beskrivning-mobil" placeholder="Vad gjorde du?">
            </div>

            <div class="edit-buttons">
                <button class="save-btn" id="spara-btn-mobil">Spara</button>
                <a href="uppgifter.html" class="cancel-btn">Avbryt</a>
            </div>
        </div>
    </div>



    <footer class="mobile-footer">
        <a href="index.html" class="nav-item">Hem</a>
        <a href="aktiviteter.html" class="nav-item">Aktiviteter</a>
        <a href="uppgifter.html" class="nav-item active">Uppgifter</a>
        <a href="sammanstallning.html" class="nav-item">Totalt</a>
    </footer>
</div>

<script src="js/editUppgift.js"></script>
<script src="js/main.js"></script>
</body>
</html>
