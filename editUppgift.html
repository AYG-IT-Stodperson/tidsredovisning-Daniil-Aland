<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tidapp - Redigera Uppgift</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- DESKTOP VY -->
<div class="desktop-wrapper">
    <header class="header">Tidapp - Uppgifter</header>



    <div class="main-layout">
        <aside class="sidebar">
            <a href="index.html" class="nav-item">HEM</a>
            <a href="aktiviteter.html" class="nav-item">AKTIVITETER</a>
            <a href="uppgifter.html" class="nav-item active">UPPGIFTER</a>
            <a href="sammanstallning.html" class="nav-item">TOTALT</a>
        </aside>


        <main class="content">
            <h2 id="form-titel">Ny uppgift</h2>

            <div class="log-form">
                <div class="input-field">
                    <label>Aktivitet</label>
                    <select id="uppgift-aktivitet"></select>
                </div>
                <div class="input-field">
                    <label>Datum</label>
                    <input type="date" id="uppgift-datum">
                </div>
                <div class="input-field">
                    <label>Tid (tim)</label>
                    <input type="number" id="uppgift-tid" placeholder="0" step="0.5">
                </div>
                <div class="input-field">
                    <label>Beskrivning</label>
                    <input type="text" id="uppgift-beskrivning" placeholder="Vad gjorde du?">
                </div>
                <div class="edit-buttons">
                    <button class="save-btn" id="spara-btn">Spara</button>
                    <a href="uppgifter.html" class="btn-outline cancel-btn"
                       style="text-decoration:none; margin-left:10px;">Avbryt</a>
                </div>
            </div>
        </main>
    </div>
</div>




<!-- MOBIL VY -->
<div class="mobile-wrapper">
    <header class="mobile-header">Tidapp - Uppgifter</header>

    <div class="mobile-content">
        <h3 id="mob-form-titel" style="padding: 10px;">Ny uppgift</h3>
        <div class="log-form-mobile">
            <div class="input-field">
                <label>Aktivitet</label>
                <select id="mob-uppgift-aktivitet"></select>
            </div>
            <div class="input-field">
                <label>Datum</label>
                <input type="date" id="mob-uppgift-datum">
            </div>
            <div class="input-field">
                <label>Tid (tim)</label>
                <input type="number" id="mob-uppgift-tid" placeholder="0" step="0.5">
            </div>
            <div class="input-field">
                <label>Beskrivning</label>
                <input type="text" id="mob-uppgift-beskrivning" placeholder="Vad gjorde du?">
            </div>
            <div class="edit-buttons">
                <button class="save-btn" id="mob-spara-btn">Spara</button>
                <a href="uppgifter.html" class="btn-outline cancel-btn"
                   style="text-decoration:none; margin-left:10px;">Avbryt</a>
            </div>
        </div>
    </div>



    <footer class="mobile-footer">
        <a href="index.html" class="nav-item">Hem</a>
        <a href="aktiviteter.html" class="nav-item">Aktiviteter</a>
        <a href="uppgifter.html" class="nav-item active">Uppgifter</a>
        <a href="sammanstallning.html" class="nav-item">Totalt</a>
    </footer>
</div>



<script src="js/uppgifter.js"></script>
<script src="js/main.js"></script>
</body>
</html>
