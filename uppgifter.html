<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tidapp - Uppgifter</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="desktop-wrapper">
    <header class="header">Tidapp - Lägg till Uppgift</header>
    <div class="main-layout">
        <aside class="sidebar">
            <a href="index.html" class="nav-item">HEM</a>
            <a href="aktiviteter.html" class="nav-item">AKTIVITETER</a>
            <a href="uppgifter.html" class="nav-item active">UPPGIFTER</a>
            <a href="sammanstallning.html" class="nav-item">TOTALT</a>
        </aside>
        <main class="content">
            <h2>Logga ny uppgift</h2>
            <div class="log-form">
                <div class="input-field">
                    <label>Aktivitet</label>
                    <select><option>Cykla</option><option>Läxor</option></select>
                </div>
                <div class="input-field">
                    <label>Datum</label>
                    <input type="date">
                </div>
                <div class="input-field">
                    <label>Tid (tim)</label>
                    <input type="number" placeholder="0" step="0.5">
                </div>
                <div class="input-field">
                    <label>Beskrivning</label>
                    <input type="text" placeholder="Vad gjorde du?">
                </div>
                <button class="save-btn">Spara</button>
            </div>

            <div class="item-list">
                <div class="item">
                    <span>2026-04-22: Träningspass — Cykla (1 timme)</span>
                    <div class="action-buttons">
                        <a href="#redigera-fomular" class="action-btn edit-btn" style="text-decoration:none;">Ändra</a>
                        <button class="action-btn delete-btn">Ta bort</button>
                    </div>
                </div>

                <div class="item">
                    <span>2026-04-23: Läxläsning — Matte (2 timmar)</span>
                    <div class="action-buttons">
                        <a href="#redigera-fomular" class="action-btn edit-btn" style="text-decoration:none;">Ändra</a>
                        <button class="action-btn delete-btn">Ta bort</button>
                    </div>
                </div>
            </div>

            <div id="redigera-fomular" class="hidden-section">
                <h3>Redigera Uppgift</h3>
                <div class="edit-box-content">
                    <div class="input-field">
                        <label>Aktivitet</label>
                        <select><option selected>Cykla</option><option>Läxor</option></select>
                    </div>
                    <div class="input-field">
                        <label>Datum</label>
                        <input type="date" value="2026-04-22">
                    </div>
                    <div class="input-field">
                        <label>Tid (timmar)</label>
                        <input type="number" value="1" step="0.5">
                    </div>
                    <div class="input-field">
                        <label>Beskrivning</label>
                        <input type="text" value="Träningspass">
                    </div>

                    <div class="edit-buttons">
                        <a href="#" class="save-btn" style="text-decoration:none; margin-right: 10px;">Spara</a>
                        <a href="#" class="action-btn cancel-btn" style="text-decoration:none;">Avbryt</a>
                    </div>
                </div>
            </div>

        </main>
    </div>
</div>

<div class="mobile-wrapper">
</div>

</body>
</html>
