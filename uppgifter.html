<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tidapp - Uppgifter</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="desktop-wrapper">
    <header class="header">Tidapp - Lägg till Uppgift</header>

    <div class="main-layout">
        <aside class="sidebar">
            <a href="index.html" class="nav-item">HEM</a>
            <a href="aktiviteter.html" class="nav-item">AKTIVITETER</a>
            <a href="uppgifter.html" class="nav-item active">UPPGIFTER</a>
            <a href="sammanstallning.html" class="nav-item">TOTALT</a>
        </aside>


        <main class="content">
            <h2>Logga ny uppgift</h2>

            <div class="log-form">

                <div class="input-field width-medium">
                    <label>Aktivitet</label>
                    <select>
                        <option>Cykla</option>
                        <option>Läxor</option>
                    </select>
                </div>

                <div class="input-field width-medium">
                    <label>Datum</label>
                    <input type="date">
                </div>

                <div class="input-field width-small">
                    <label>Tid (tim)</label>
                    <input type="number" placeholder="0" step="0.5">
                </div>

                <div class="input-field width-large">
                    <label>Beskrivning</label>
                    <input type="text" placeholder="Vad gjorde du?">
                </div>

                <button class="save-btn">Spara</button>
            </div>

            <div class="item-list">
                <div class="item">
                    <span>2026-04-22: Träningspass (1 timme)</span>
                    <div>
                        <button class="action-btn edit-btn">Ändra</button>
                        <button class="action-btn delete-btn">Ta bort</button>
                    </div>
                </div>
            </div>
        </main>

    </div>
</div>

<div class="mobile-wrapper">
    <header class="mobile-header">Tidapp - Lägg till Uppgift</header>
    <div class="mobile-content">
        <h2>Logga ny uppgift</h2>



        <div class="log-form">
            <div class="input-field">
                <label>Aktivitet</label>
                <select>
                    <option>Cykla</option>
                    <option>Läxor</option>
                </select>
            </div>


            <div class="input-field">
                <label>Datum</label>
                <input type="date">
            </div>




            <div class="input-field">
                <label>Tid (tim)</label>
                <input type="number" placeholder="0" step="0.5">
            </div>

            <div class="input-field">
                <label>Beskrivning</label>
                <input type="text" placeholder="Vad gjorde du?">
            </div>

            <button class="save-btn">Spara</button>
        </div>



        <div class="item-list">
            <div class="item">
                <span>2026-04-22: Träningspass (1 timme)</span>
                <div class="action-buttons">
                    <button class="action-btn edit-btn">Ändra</button>
                    <button class="action-btn delete-btn">Ta bort</button>
                </div>
            </div>
        </div>
    </div>



    <footer class="mobile-footer">
        <a href="index.html" class="nav-item">
            <span class="icon icon-home"></span>
            <span class="nav-text">Hem</span>
        </a>
        <a href="aktiviteter.html" class="nav-item">
            <span class="icon icon-list"></span>
            <span class="nav-text">Aktiviteter</span>
        </a>
        <a href="uppgifter.html" class="nav-item active">
            <span class="icon icon-check"></span>
            <span class="nav-text">Uppgifter</span>
        </a>
        <a href="sammanstallning.html" class="nav-item">
            <span class="icon icon-chart"></span>
            <span class="nav-text">Totalt</span>
        </a>
    </footer>


</div>
</body>
</html>
