<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tidapp - Uppgifter</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- DESKTOP VY -->
<div class="desktop-wrapper">
    <header class="header">Tidapp - Uppgifter</header>

    <div class="main-layout">
        <aside class="sidebar">
            <a href="index.html" class="nav-item">HEM</a>
            <a href="aktiviteter.html" class="nav-item">AKTIVITETER</a>
            <a href="uppgifter.html" class="nav-item active">UPPGIFTER</a>
            <a href="sammanstallning.html" class="nav-item">TOTALT</a>
        </aside>

        <main class="content">

            <p>
                <input type="radio" id="alternativ" value="period" checked>
                Period:
                <input type="date" id="franDatum" value="2026-05-01">
                <input type="date" id="tillDatum" value="2026-06-01">
                <button id="hamta">Hämta data</button>
            </p>

            <p>
                <input type="radio" name="alternativ" value="sida">
                Sida:
                <select>
                    <option>1</option>
                    <option>2</option>
                    <option>3</option>
                    <option>4</option>
                </select>
                <button id="hamtaSida">Hämta data</button>
            </p>



            <h2>Uppgifter</h2>
            <button class="save-btn" onclick="window.location.href='editUppgift.html'">
                + Skapa ny uppgift
            </button>
            <div class="item-list"></div>

        </main>


    </div>
</div>




<!-- MOBIL VY -->
<div class="mobile-wrapper">
    <header class="mobile-header">
        Tidapp - Uppgifter
        <button class="add-mobile-btn" onclick="window.location.href='editUppgift.html'">+</button>
    </header>


    <p>
        <input type="radio" id="alternativ" value="period" checked>
        Period:
        <input type="date" id="franDatum-mobil" value="2026-05-01">
        <input type="date" id="tillDatum-mobil" value="2026-06-01">
        <button id="hamtamobil">Hämta data</button>
    </p>





    <div class="mobile-content">
        <div class="item-list-mobil"></div>
    </div>

    <footer class="mobile-footer">
        <a href="index.html" class="nav-item">Hem</a>
        <a href="aktiviteter.html" class="nav-item">Aktiviteter</a>
        <a href="uppgifter.html" class="nav-item active">Uppgifter</a>
        <a href="sammanstallning.html" class="nav-item">Totalt</a>
    </footer>
</div>

<script src="js/uppgifter.js"></script>
<script src="js/main.js"></script>
</body>
</html>
